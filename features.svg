<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="VitalScope features">
  <title>VitalScope Features</title>
  <defs>
    <filter id="card" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#FAFBFC"/>

  <text x="600" y="50" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="32" font-weight="800" fill="#0F172A">What it measures</text>
  <text x="600" y="78" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="14" fill="#64748B">Four vital signs in one compact device</text>

  <!-- Card 1: Heart Rate -->
  <g filter="url(#card)" transform="translate(60, 130)">
    <rect width="250" height="240" rx="14" fill="#FFFFFF"/>
    <rect width="250" height="60" rx="14" fill="#FEE2E2"/>
    <rect y="46" width="250" height="14" fill="#FEE2E2"/>

    <!-- Heart icon -->
    <g transform="translate(85, 16) scale(0.8)">
      <circle cx="20" cy="20" r="14" fill="#DC2626"/>
      <circle cx="44" cy="20" r="14" fill="#DC2626"/>
      <polygon points="6,28 58,28 32,60" fill="#DC2626"/>
    </g>

    <text x="125" y="90" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="20" font-weight="700" fill="#0F172A">Heart Rate</text>
    <text x="125" y="110" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#64748B">via MAX30102 sensor</text>

    <text x="125" y="148" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="42" font-weight="800" fill="#DC2626">60-100</text>
    <text x="125" y="170" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12" fill="#64748B">BPM (normal range)</text>

    <text x="125" y="208" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">Optical photoplethysmography</text>
    <text x="125" y="222" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">Sample rate: 100 Hz</text>
  </g>

  <!-- Card 2: SpO2 -->
  <g filter="url(#card)" transform="translate(335, 130)">
    <rect width="250" height="240" rx="14" fill="#FFFFFF"/>
    <rect width="250" height="60" rx="14" fill="#E0F2FE"/>
    <rect y="46" width="250" height="14" fill="#E0F2FE"/>

    <!-- O2 icon -->
    <g transform="translate(110, 18)">
      <circle cx="15" cy="15" r="14" fill="none" stroke="#0284C7" stroke-width="3"/>
      <text x="15" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0284C7">O₂</text>
    </g>

    <text x="125" y="90" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="20" font-weight="700" fill="#0F172A">Blood Oxygen</text>
    <text x="125" y="110" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#64748B">SpO₂ via MAX30102</text>

    <text x="125" y="148" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="42" font-weight="800" fill="#0284C7">95-100</text>
    <text x="125" y="170" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12" fill="#64748B">% (normal range)</text>

    <text x="125" y="208" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">Red + IR LED comparison</text>
    <text x="125" y="222" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">Validated algorithm</text>
  </g>

  <!-- Card 3: Temperature -->
  <g filter="url(#card)" transform="translate(610, 130)">
    <rect width="250" height="240" rx="14" fill="#FFFFFF"/>
    <rect width="250" height="60" rx="14" fill="#FEF3C7"/>
    <rect y="46" width="250" height="14" fill="#FEF3C7"/>

    <!-- Thermometer icon -->
    <g transform="translate(115, 12)">
      <rect x="0" y="0" width="8" height="30" rx="4" fill="#D97706"/>
      <circle cx="4" cy="34" r="8" fill="#D97706"/>
    </g>

    <text x="125" y="90" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="20" font-weight="700" fill="#0F172A">Body Temperature</text>
    <text x="125" y="110" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#64748B">via DS18B20 probe</text>

    <text x="125" y="148" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="42" font-weight="800" fill="#D97706">36.5°C</text>
    <text x="125" y="170" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12" fill="#64748B">typical skin temp</text>

    <text x="125" y="208" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">±0.5°C accuracy</text>
    <text x="125" y="222" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">Waterproof probe</text>
  </g>

  <!-- Card 4: ECG -->
  <g filter="url(#card)" transform="translate(885, 130)">
    <rect width="250" height="240" rx="14" fill="#FFFFFF"/>
    <rect width="250" height="60" rx="14" fill="#D1FAE5"/>
    <rect y="46" width="250" height="14" fill="#D1FAE5"/>

    <!-- ECG icon -->
    <path d="M 95 30 L 110 30 L 115 24 L 125 36 L 130 12 L 135 48 L 140 30 L 155 30"
          fill="none" stroke="#059669" stroke-width="3"/>

    <text x="125" y="90" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="20" font-weight="700" fill="#0F172A">Live ECG</text>
    <text x="125" y="110" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#64748B">via AD8232 module</text>

    <text x="125" y="148" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="32" font-weight="800" fill="#059669">200 Hz</text>
    <text x="125" y="170" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12" fill="#64748B">sampling rate</text>

    <text x="125" y="208" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">Real-time waveform</text>
    <text x="125" y="222" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#475569">R-peak BPM detection</text>
  </g>

  <!-- Bottom: Specs strip -->
  <g transform="translate(60, 420)">
    <rect width="1080" height="240" rx="14" fill="#0F172A"/>
    <text x="540" y="40" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#F1F5F9">Technical Specifications</text>

    <g font-family="'SF Pro Text', sans-serif">
      <g transform="translate(40, 80)">
        <text font-size="11" font-weight="700" fill="#22D3EE">PROCESSING</text>
        <text y="22" font-size="14" font-weight="600" fill="#F1F5F9">ESP32 WROOM-32</text>
        <text y="42" font-size="11" fill="#94A3B8">Dual-core 240 MHz</text>
        <text y="58" font-size="11" fill="#94A3B8">520 KB SRAM</text>
        <text y="74" font-size="11" fill="#94A3B8">4 MB Flash</text>
      </g>

      <g transform="translate(220, 80)">
        <text font-size="11" font-weight="700" fill="#22D3EE">DISPLAY</text>
        <text y="22" font-size="14" font-weight="600" fill="#F1F5F9">SSD1306 OLED</text>
        <text y="42" font-size="11" fill="#94A3B8">0.96 inch</text>
        <text y="58" font-size="11" fill="#94A3B8">128×64 pixels</text>
        <text y="74" font-size="11" fill="#94A3B8">I²C interface</text>
      </g>

      <g transform="translate(400, 80)">
        <text font-size="11" font-weight="700" fill="#22D3EE">POWER</text>
        <text y="22" font-size="14" font-weight="600" fill="#F1F5F9">USB / 3.3V LiPo</text>
        <text y="42" font-size="11" fill="#94A3B8">5V via USB</text>
        <text y="58" font-size="11" fill="#94A3B8">~120 mA active</text>
        <text y="74" font-size="11" fill="#94A3B8">Portable-ready</text>
      </g>

      <g transform="translate(580, 80)">
        <text font-size="11" font-weight="700" fill="#22D3EE">INPUT</text>
        <text y="22" font-size="14" font-weight="600" fill="#F1F5F9">3× Tactile Buttons</text>
        <text y="42" font-size="11" fill="#94A3B8">UP / SELECT / DOWN</text>
        <text y="58" font-size="11" fill="#94A3B8">Debounced 30ms</text>
        <text y="74" font-size="11" fill="#94A3B8">Pull-up internal</text>
      </g>

      <g transform="translate(760, 80)">
        <text font-size="11" font-weight="700" fill="#22D3EE">CODE</text>
        <text y="22" font-size="14" font-weight="600" fill="#F1F5F9">779 lines C++</text>
        <text y="42" font-size="11" fill="#94A3B8">Arduino IDE</text>
        <text y="58" font-size="11" fill="#94A3B8">~300 KB compiled</text>
        <text y="74" font-size="11" fill="#94A3B8">MIT licensed</text>
      </g>

      <g transform="translate(940, 80)">
        <text font-size="11" font-weight="700" fill="#22D3EE">PHYSICAL</text>
        <text y="22" font-size="14" font-weight="600" fill="#F1F5F9">Veroboard build</text>
        <text y="42" font-size="11" fill="#94A3B8">~10 × 8 cm</text>
        <text y="58" font-size="11" fill="#94A3B8">No PCB needed</text>
        <text y="74" font-size="11" fill="#94A3B8">Hand-solderable</text>
      </g>
    </g>

    <text x="540" y="220" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="10" fill="#64748B" letter-spacing="1">⚠ NOT A MEDICAL DEVICE · FOR EDUCATIONAL AND HOBBYIST USE ONLY</text>
  </g>
</svg>
