<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="VitalScope screen mockups">
  <title>VitalScope Screen Mockups</title>
  <defs>
    <filter id="bezel" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="screen-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="#F8FAFC"/>

  <text x="600" y="40" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="24" font-weight="700" fill="#0F172A">User Interface Screens</text>
  <text x="600" y="62" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="13" fill="#64748B">All running on a 128×64 monochrome OLED</text>

  <!-- Screen 1: Boot Splash -->
  <g transform="translate(60, 110)" filter="url(#bezel)">
    <rect width="260" height="160" rx="8" fill="#1E293B"/>
    <rect x="12" y="12" width="236" height="136" rx="4" fill="#000"/>

    <!-- Heart icon -->
    <g transform="translate(115, 30)">
      <circle cx="10" cy="10" r="6" fill="#22D3EE"/>
      <circle cx="20" cy="10" r="6" fill="#22D3EE"/>
      <polygon points="3,14 27,14 15,30" fill="#22D3EE"/>
    </g>

    <!-- Spinner arc -->
    <path d="M 110 50 A 30 30 0 1 1 150 50" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.6"/>

    <text x="130" y="90" text-anchor="middle" font-family="monospace" font-size="14" fill="#22D3EE" font-weight="bold">VitalScope</text>
    <text x="130" y="118" text-anchor="middle" font-family="monospace" font-size="9" fill="#94A3B8">Detect sensors...</text>

    <text x="130" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0F172A" font-weight="600">1. Boot Splash</text>
    <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">Animated startup</text>
  </g>

  <!-- Screen 2: Home Menu -->
  <g transform="translate(340, 110)" filter="url(#bezel)">
    <rect width="260" height="160" rx="8" fill="#1E293B"/>
    <rect x="12" y="12" width="236" height="136" rx="4" fill="#000"/>

    <text x="22" y="32" font-family="monospace" font-size="11" fill="#22D3EE">Health Monitor</text>
    <line x1="22" y1="38" x2="238" y2="38" stroke="#22D3EE" stroke-width="0.5"/>

    <rect x="22" y="44" width="216" height="20" fill="#22D3EE"/>
    <text x="30" y="58" font-family="monospace" font-size="11" fill="#000" font-weight="bold">Heart Rate / SpO2</text>
    <text x="30" y="78" font-family="monospace" font-size="11" fill="#22D3EE">Body Temperature</text>
    <text x="30" y="96" font-family="monospace" font-size="11" fill="#22D3EE">ECG Waveform</text>
    <text x="30" y="114" font-family="monospace" font-size="11" fill="#22D3EE">About</text>

    <text x="130" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0F172A" font-weight="600">2. Home Menu</text>
    <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">Button navigation</text>
  </g>

  <!-- Screen 3: HR Measuring -->
  <g transform="translate(620, 110)" filter="url(#bezel)">
    <rect width="260" height="160" rx="8" fill="#1E293B"/>
    <rect x="12" y="12" width="236" height="136" rx="4" fill="#000"/>

    <text x="22" y="32" font-family="monospace" font-size="11" fill="#22D3EE">Measuring...</text>
    <line x1="22" y1="38" x2="238" y2="38" stroke="#22D3EE" stroke-width="0.5"/>

    <!-- Half-filled heart -->
    <g transform="translate(110, 50)">
      <circle cx="10" cy="14" r="7" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
      <circle cx="24" cy="14" r="7" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
      <polygon points="3,20 31,20 17,40" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
      <path d="M 5 28 L 29 28 L 17 40 Z" fill="#22D3EE"/>
    </g>

    <!-- Progress bar -->
    <rect x="40" y="106" width="180" height="6" rx="3" fill="none" stroke="#22D3EE"/>
    <rect x="42" y="108" width="105" height="2" rx="1" fill="#22D3EE"/>
    <text x="130" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#22D3EE">60%</text>

    <text x="130" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0F172A" font-weight="600">3. Heart Rate</text>
    <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">Filling heart animation</text>
  </g>

  <!-- Screen 4: HR Results -->
  <g transform="translate(900, 110)" filter="url(#bezel)">
    <rect width="260" height="160" rx="8" fill="#1E293B"/>
    <rect x="12" y="12" width="236" height="136" rx="4" fill="#000"/>

    <text x="22" y="32" font-family="monospace" font-size="11" fill="#22D3EE">Results</text>
    <line x1="22" y1="38" x2="238" y2="38" stroke="#22D3EE" stroke-width="0.5"/>

    <text x="40" y="56" font-family="monospace" font-size="10" fill="#22D3EE">HR:</text>
    <text x="40" y="88" font-family="monospace" font-size="22" fill="#22D3EE" font-weight="bold">72</text>
    <text x="40" y="106" font-family="monospace" font-size="9" fill="#22D3EE">BPM</text>

    <text x="140" y="56" font-family="monospace" font-size="10" fill="#22D3EE">SpO2:</text>
    <text x="140" y="88" font-family="monospace" font-size="22" fill="#22D3EE" font-weight="bold">98</text>
    <text x="140" y="106" font-family="monospace" font-size="9" fill="#22D3EE">%</text>

    <line x1="22" y1="122" x2="238" y2="122" stroke="#22D3EE" stroke-width="0.5"/>
    <text x="30" y="138" font-family="monospace" font-size="8" fill="#22D3EE">UP=back  SEL=retry</text>

    <text x="130" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0F172A" font-weight="600">4. Results</text>
    <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">Big readouts</text>
  </g>

  <!-- Screen 5: Body Temp -->
  <g transform="translate(200, 310)" filter="url(#bezel)">
    <rect width="260" height="160" rx="8" fill="#1E293B"/>
    <rect x="12" y="12" width="236" height="136" rx="4" fill="#000"/>

    <text x="22" y="32" font-family="monospace" font-size="11" fill="#22D3EE">Body Temp</text>
    <line x1="22" y1="38" x2="238" y2="38" stroke="#22D3EE" stroke-width="0.5"/>

    <text x="130" y="78" text-anchor="middle" font-family="monospace" font-size="24" fill="#22D3EE" font-weight="bold">36.5°C</text>
    <text x="130" y="100" text-anchor="middle" font-family="monospace" font-size="12" fill="#22D3EE">Normal</text>

    <line x1="22" y1="122" x2="238" y2="122" stroke="#22D3EE" stroke-width="0.5"/>
    <text x="30" y="138" font-family="monospace" font-size="8" fill="#22D3EE">UP = back</text>

    <text x="130" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0F172A" font-weight="600">5. Body Temperature</text>
    <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">DS18B20 with smoothing</text>
  </g>

  <!-- Screen 6: ECG Live -->
  <g transform="translate(540, 310)" filter="url(#bezel)">
    <rect width="260" height="160" rx="8" fill="#1E293B"/>
    <rect x="12" y="12" width="236" height="136" rx="4" fill="#000"/>

    <text x="22" y="32" font-family="monospace" font-size="11" fill="#22D3EE">ECG LIVE</text>
    <text x="160" y="32" font-family="monospace" font-size="11" fill="#22D3EE">HR: 72</text>
    <line x1="22" y1="38" x2="238" y2="38" stroke="#22D3EE" stroke-width="0.5"/>

    <!-- ECG trace -->
    <path d="M 22 88 L 50 88 L 60 85 L 70 88 L 80 70 L 85 105 L 90 88 L 130 88 L 140 85 L 150 88 L 160 70 L 165 105 L 170 88 L 230 88"
          fill="none" stroke="#22D3EE" stroke-width="1.5"/>

    <line x1="22" y1="122" x2="238" y2="122" stroke="#22D3EE" stroke-width="0.5"/>
    <text x="30" y="138" font-family="monospace" font-size="8" fill="#22D3EE">UP = back</text>

    <text x="130" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0F172A" font-weight="600">6. Live ECG</text>
    <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">Real-time waveform</text>
  </g>

  <!-- Screen 7: About -->
  <g transform="translate(880, 310)" filter="url(#bezel)">
    <rect width="260" height="160" rx="8" fill="#1E293B"/>
    <rect x="12" y="12" width="236" height="136" rx="4" fill="#000"/>

    <text x="22" y="32" font-family="monospace" font-size="11" fill="#22D3EE">About</text>
    <line x1="22" y1="38" x2="238" y2="38" stroke="#22D3EE" stroke-width="0.5"/>

    <text x="22" y="54" font-family="monospace" font-size="10" fill="#22D3EE">VitalScope v2.1</text>
    <text x="22" y="68" font-family="monospace" font-size="10" fill="#22D3EE">OLED + DS18B20</text>
    <text x="22" y="88" font-family="monospace" font-size="10" fill="#22D3EE">MAX30102: OK</text>
    <text x="22" y="102" font-family="monospace" font-size="10" fill="#22D3EE">DS18B20:  OK</text>

    <line x1="22" y1="122" x2="238" y2="122" stroke="#22D3EE" stroke-width="0.5"/>
    <text x="30" y="138" font-family="monospace" font-size="8" fill="#22D3EE">UP = back</text>

    <text x="130" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0F172A" font-weight="600">7. About</text>
    <text x="130" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">System status</text>
  </g>
</svg>
